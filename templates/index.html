<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Coach</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18" stroke="#6C63FF" stroke-width="2" fill="none"/>
                    <path d="M12 28 L18 16 L24 24 L30 12" stroke="#6C63FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="18" cy="16" r="3" fill="#6C63FF"/>
                    <circle cx="24" cy="24" r="3" fill="#6C63FF"/>
                    <circle cx="30" cy="12" r="3" fill="#6C63FF"/>
                </svg>
                <h1>Top IT Career Coach & Roadmap Generator</h1>
            </div>
            <p class="subtitle">Discover your ideal career path powered by artificial intelligence</p>
        </header>

        <main>
            <form action="/predict" method="POST" class="career-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="coding_interest">Coding Interest</label>
                        <div class="slider-container">
                            <input type="range" id="coding_interest" name="coding_interest" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="coding_interest_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="mathematics_interest">Mathematics Interest</label>
                        <div class="slider-container">
                            <input type="range" id="mathematics_interest" name="mathematics_interest" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="mathematics_interest_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="analytical_thinking">Analytical Thinking</label>
                        <div class="slider-container">
                            <input type="range" id="analytical_thinking" name="analytical_thinking" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="analytical_thinking_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="problem_solving">Problem Solving</label>
                        <div class="slider-container">
                            <input type="range" id="problem_solving" name="problem_solving" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="problem_solving_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="creativity">Creativity</label>
                        <div class="slider-container">
                            <input type="range" id="creativity" name="creativity" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="creativity_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="communication_skills">Communication Skills</label>
                        <div class="slider-container">
                            <input type="range" id="communication_skills" name="communication_skills" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="communication_skills_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="leadership">Leadership</label>
                        <div class="slider-container">
                            <input type="range" id="leadership" name="leadership" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="leadership_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="attention_to_detail">Attention To Detail</label>
                        <div class="slider-container">
                            <input type="range" id="attention_to_detail" name="attention_to_detail" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="attention_to_detail_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="research_interest">Research Interest</label>
                        <div class="slider-container">
                            <input type="range" id="research_interest" name="research_interest" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="research_interest_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="business_interest">Business Interest</label>
                        <div class="slider-container">
                            <input type="range" id="business_interest" name="business_interest" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="business_interest_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="design_interest">Design Interest</label>
                        <div class="slider-container">
                            <input type="range" id="design_interest" name="design_interest" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="design_interest_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="learning_new_technology">Learning New Technology</label>
                        <div class="slider-container">
                            <input type="range" id="learning_new_technology" name="learning_new_technology" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="learning_new_technology_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="teamwork">Teamwork</label>
                        <div class="slider-container">
                            <input type="range" id="teamwork" name="teamwork" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="teamwork_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="independent_work">Independent Work</label>
                        <div class="slider-container">
                            <input type="range" id="independent_work" name="independent_work" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="independent_work_value">50</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="risk_taking">Risk Taking</label>
                        <div class="slider-container">
                            <input type="range" id="risk_taking" name="risk_taking" min="0" max="100" value="50" class="slider">
                            <span class="slider-value" id="risk_taking_value">50</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="currentColor"/>
                    </svg>
                    Predict My Career
                </button>
            </form>
        </main>

        <footer class="footer">
            <p>&copy; 2024 AI Career Coach. All rights reserved.</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
